<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1117" />
    <!-- Prevent browsers/CDNs from holding onto a stale index.html that
         points to a deleted JS bundle. Hashed assets stay cacheable. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Stavira — Stavební projekty pod kontrolou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <noscript>
        <div style="padding:40px;font-family:sans-serif;color:#0f1117;text-align:center">
          <h1>Stavira</h1>
          <p>Pro spuštění aplikace je potřeba zapnutý JavaScript.</p>
        </div>
      </noscript>
    </div>
    <!-- Error catcher: if the bundle crashes before React mounts,
         show a recovery screen instead of a blank page. -->
    <script>
      window.__staviraStarted = false;
      function showFallback(message, filename, lineno) {
        var root = document.getElementById('root');
        if (!root || (root.children.length > 0 && !root.querySelector('noscript'))) return;
        var html = ''
          + '<div style="padding:40px 20px;font-family:system-ui,-apple-system,sans-serif;color:#0f1117;max-width:560px;margin:40px auto">'
          + '<div style="display:inline-flex;align-items:center;gap:12px;margin-bottom:24px">'
          +   '<div style="width:44px;height:44px;border-radius:10px;background:#fbbf24;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#0f1117">!</div>'
          +   '<div><p style="font-weight:700;font-size:18px;margin:0">Stavira</p>'
          +   '<p style="color:#64748b;font-size:13px;margin:0">Aplikace se nemůže spustit</p></div>'
          + '</div>'
          + '<h1 style="font-size:24px;font-weight:800;margin:0 0 12px;line-height:1.2">Něco se pokazilo</h1>'
          + '<p style="color:#475569;margin:0 0 20px;line-height:1.5">Nejčastější příčinou jsou zastaralá data v prohlížeči po aktualizaci. Klikněte na tlačítko níže — to vyřeší 99 % případů.</p>'
          + '<button id="stavira-reset" style="background:#0f1117;color:white;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;border:none;cursor:pointer;margin-right:8px">Resetovat data a obnovit</button>'
          + '<button id="stavira-reload" style="background:white;color:#0f1117;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;border:1px solid #e2e8f0;cursor:pointer">Jen obnovit stránku</button>'
          + (message ? '<details style="margin-top:32px;background:white;border:1px solid #e2e8f0;border-radius:10px;padding:12px">'
          +   '<summary style="cursor:pointer;font-size:12px;font-weight:600;color:#64748b">Technické detaily</summary>'
          +   '<p style="font-size:12px;font-family:monospace;margin:12px 0 4px;word-break:break-word">' + message + '</p>'
          +   (filename ? '<p style="font-size:11px;color:#64748b;font-family:monospace;margin:0;word-break:break-all">' + filename + ':' + (lineno || '?') + '</p>' : '')
          + '</details>' : '')
          + '</div>';
        root.innerHTML = html;
        document.getElementById('stavira-reset').addEventListener('click', function () {
          try {
            var keys = [];
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (k && k.indexOf('stavira:') === 0) keys.push(k);
            }
            keys.forEach(function (k) { localStorage.removeItem(k); });
          } catch (e) { /* ignore */ }
          window.location.hash = '#/';
          window.location.reload();
        });
        document.getElementById('stavira-reload').addEventListener('click', function () {
          window.location.reload();
        });
      }
      window.addEventListener('error', function (e) {
        if (window.__staviraStarted) return;
        showFallback(e.message || 'Neznámá chyba', e.filename, e.lineno);
      });
      window.addEventListener('unhandledrejection', function (e) {
        if (window.__staviraStarted) return;
        var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
        showFallback('Promise rejection: ' + msg, '', '');
      });
      requestAnimationFrame(function () {
        setTimeout(function () { window.__staviraStarted = true; }, 800);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
