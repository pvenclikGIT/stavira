<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1117" />
    <title>Stavira — Stavební projekty pod kontrolou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <noscript>
        <div style="padding:40px;font-family:sans-serif;color:#0f1117;text-align:center">
          <h1>Stavira</h1>
          <p>Pro spuštění aplikace je potřeba zapnutý JavaScript.</p>
        </div>
      </noscript>
    </div>
    <!-- Error catcher: if the bundle crashes, show what happened instead of a blank screen -->
    <script>
      window.__staviraStarted = false;
      window.addEventListener('error', function (e) {
        if (window.__staviraStarted) return;
        var root = document.getElementById('root');
        if (!root || root.children.length > 0) return;
        root.innerHTML =
          '<div style="padding:24px;font-family:sans-serif;color:#0f1117;max-width:560px;margin:60px auto">' +
          '<h1 style="margin:0 0 8px">Stavira se nemůže spustit</h1>' +
          '<p style="color:#5a5d68;margin:0 0 16px">' +
            (e.message ? e.message : 'Neznámá chyba') +
          '</p>' +
          (e.filename ? '<code style="font-size:12px;color:#888;word-break:break-all">' + e.filename + ':' + (e.lineno||'?') + '</code>' : '') +
          '<p style="margin:20px 0 0;font-size:13px;color:#888">Zkuste obnovit stránku (Cmd/Ctrl + Shift + R).</p>' +
          '</div>';
      });
      // Mark started once first paint happens
      requestAnimationFrame(function () {
        setTimeout(function () { window.__staviraStarted = true; }, 800);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
